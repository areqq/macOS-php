; On PHP 8, `--enable-opcache` compiles opcache statically into the binary
; (builtin Zend extension) — no opcache.so to load, no zend_extension line.
; The settings below still apply to the builtin opcache.

opcache.enable=1
; DEV: set to 1 if you want opcache for the built-in server (php -S uses CLI SAPI).
opcache.enable_cli=0

opcache.memory_consumption=128
opcache.interned_strings_buffer=16
opcache.max_accelerated_files=20000

; opcache JIT (PHP 8) — 1255 = tracing JIT (matches the production image).
; Works under FPM on macOS arm64 (PHP 8.x), unlike the PHP 5.6 build.
opcache.jit=1255
opcache.jit_buffer_size=64M

; DEV: 1 + revalidate every 2s so code changes are picked up without an FPM
; restart. In production use 0 (immutable; rebuild = deploy).
opcache.validate_timestamps=1
opcache.revalidate_freq=2
