; FPM pool — LOCAL DEV (macOS). @PREFIX@ is substituted by compile-php.sh.
[www]
; user/group OMITTED — FPM runs as a normal user (not root). The worker
; inherits the user of the master process.

; Unix socket in the prefix (writable locally). nginx points fastcgi_pass here.
listen = @PREFIX@/var/run/php-fpm.sock
listen.mode = 0660
listen.backlog = 511

pm = dynamic
pm.max_children = 8
pm.start_servers = 2
pm.min_spare_servers = 2
pm.max_spare_servers = 4
pm.max_requests = 2000

request_terminate_timeout = 65s
request_slowlog_timeout = 10s
slowlog = @PREFIX@/var/log/php-fpm.slow.log

clear_env = no
catch_workers_output = yes

ping.path = /fpm-ping
ping.response = pong
pm.status_path = /fpm-status

security.limit_extensions = .php

php_admin_flag[log_errors] = on
; opcache (incl. JIT) stays enabled under FPM — it works on macOS arm64 with
; PHP 8.x (unlike the PHP 5.6 build, which had to disable it).
