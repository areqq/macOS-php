; FPM pool — LOCAL DEV (macOS). @PREFIX@ is substituted by compile-php.sh.
[www]
; user/group OMITTED — FPM runs as a normal user (not root), so these
; directives would be ignored and only log a NOTICE at startup. The worker
; inherits the user of the master process.

; Unix socket in the prefix (writable locally). nginx points fastcgi_pass here.
; No listen.owner/group — FPM starts as a normal user, so the socket belongs to
; them and nginx runs as the same user → mode 0660 is enough. Baking a fixed
; user (build-time whoami) broke moving the prefix to another machine: php-fpm
; tried to chown the socket to a non-existent user → "cannot get uid".
listen = @PREFIX@/var/run/php-fpm.sock
listen.mode = 0660
listen.backlog = 511

; Local dev (single user) — modest pool.
pm = dynamic
pm.max_children = 6
pm.start_servers = 2
pm.min_spare_servers = 2
pm.max_spare_servers = 4
pm.max_requests = 2000

request_terminate_timeout = 65s
request_slowlog_timeout = 10s
slowlog = @PREFIX@/var/log/php-fpm.slow.log

clear_env = no
catch_workers_output = yes

ping.path = /fpm-ping
ping.response = pong
pm.status_path = /fpm-status

security.limit_extensions = .php

php_admin_flag[log_errors] = on

; opcache under FPM SIGBUSes on macOS arm64 (shared memory + prefork workers).
; Local dev doesn't need it (validate_timestamps=1; CLI has enable_cli=0).
; APCu works fine under FPM — it stays enabled.
php_admin_value[opcache.enable] = 0
