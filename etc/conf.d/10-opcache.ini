zend_extension=opcache.so

opcache.enable=1
; DEV: set to 1 if you want opcache for the built-in server (php -S uses the CLI SAPI).
opcache.enable_cli=0

opcache.memory_consumption=96
opcache.interned_strings_buffer=8
opcache.max_accelerated_files=20000

; DEV: 1 + revalidate every 2s so code changes are picked up without an FPM
; restart. In production use 0 (immutable; rebuild = deploy).
opcache.validate_timestamps=1
opcache.revalidate_freq=2

opcache.fast_shutdown=1
opcache.huge_code_pages=0

; Keep comments/PHPDoc — some frameworks rely on reflection over annotations.
opcache.save_comments=1
opcache.load_comments=1
