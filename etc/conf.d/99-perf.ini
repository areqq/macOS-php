; Performance tuning.
;
; realpath_cache defaults to 16K on PHP 5.6 — too small for large framework
; trees (thousands of files, deep vendor paths) → the cache thrashes and every
; request re-stats the tree. 4096K holds a big tree: a worker stats it once on
; warm-up, then serves from memory.
realpath_cache_size=4096K
realpath_cache_ttl=600
