name: build

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    # Apple Silicon (arm64) hosted runner. Free & unlimited for public repos.
    runs-on: macos-14
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - name: Homebrew dependencies
        # xz (not zstd): macOS `tar` reads .xz natively, so the published
        # bundle needs no extra tool to unpack on the end user's machine.
        run: brew install re2c autoconf bison pkg-config pcre2 xz

      - name: Cache downloaded sources
        uses: actions/cache@v4
        with:
          path: ~/php56-build/src
          key: php56-src-${{ hashFiles('versions.env') }}

      - name: Build toolchain (PHP 5.6 + nginx)
        run: ./compile-php.sh

      - name: Pack distribution archive
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="$(echo "${GITHUB_SHA}" | cut -c1-7)"
          fi
          DIST_OUT="${GITHUB_WORKSPACE}/dist" DIST_TAG="${TAG}" ./compile-php.sh dist
          ls -la dist

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: php56-macos-arm64
          path: dist/*
          if-no-files-found: error

      - name: Publish GitHub Release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" dist/* --generate-notes --title "${GITHUB_REF_NAME}"
